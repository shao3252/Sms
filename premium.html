<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sms Tamu - VIP Kuntu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
    <div id="toast-container"></div>
    <div class="content-area">
        
        <div class="chat-header" style="background:var(--nav-bg); padding:15px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:15px; position:sticky; top:0; z-index:10;">
            <button class="icon-btn" style="background:none; border:none; font-size:1.2rem; cursor:pointer;" onclick="window.location.href='index.html'">🔙</button>
            <div style="flex:1;">
                <h3 style="margin:0; font-size:1.2rem; color:#d4af37;">🌟 Message Kuntu (VIP)</h3>
                <span style="font-size:0.8rem; color:var(--text-muted);">Meseji tamu za faragha</span>
            </div>
        </div>

        <div id="paywall-section" style="display: none; padding: 20px; text-align: center; margin-top: 20px;">
            <div class="card" style="border: 2px solid #d4af37; background: linear-gradient(to bottom right, var(--card-bg), rgba(212, 175, 55, 0.05));">
                <h2 style="color:#d4af37; margin-bottom: 10px;">🔒 FUNGUA KUNTU</h2>
                <p style="margin-bottom: 20px; font-size: 0.95rem;">Jiunge na kundi maalum kupata meseji tamu sana za faragha!</p>
                
                <div id="payment-details-box" style="background:var(--bg-color); padding:15px; border-radius:10px; margin-bottom:20px; text-align:left; border-left:4px solid #d4af37;">
                    </div>

                <div id="premium-form-area" style="display:none; text-align: left;">
                    <label style="font-size: 0.85rem; color: var(--text-muted); font-weight: bold;">Jina la Muamala / SMS ya Mtandao:</label>
                    <input type="text" id="premium-trans-name" placeholder="Mf. Juma Jux (QWERTY12345)" style="margin-top: 5px; margin-bottom: 15px;">
                    <button class="btn-primary" style="background: linear-gradient(135deg, #ffd700, #daa520); color: black;" onclick="premiumSystem.submitPremium()">Thibitisha Muamala</button>
                </div>
                
                <button id="show-pay-form-btn" class="btn-outline mt-1" style="width:100%; border-color:#d4af37; color:#d4af37;" onclick="document.getElementById('premium-form-area').style.display='block'; this.style.display='none';">Nimeshalipia</button>

                <div style="margin-top:25px; border-top:1px solid var(--border); padding-top:20px;">
                    <small style="color:var(--text-muted); display:block; margin-bottom:15px; font-weight: bold;">Mawasiliano (Wasiliana Nasi):</small>
                    <div style="display:flex; justify-content:space-around;">
                        <a href="https://wa.me/255799178372" target="_blank" style="color:#25D366; text-decoration:none; font-weight:bold; background: rgba(37, 211, 102, 0.1); padding: 8px 15px; border-radius: 20px;">🟢 WhatsApp</a>
                        <a href="mailto:Shaolindown2007@gmail.com" style="color:var(--danger); text-decoration:none; font-weight:bold; background: rgba(220, 53, 69, 0.1); padding: 8px 15px; border-radius: 20px;">📧 Email</a>
                    </div>
                </div>
            </div>
        </div>

        <div id="premium-feed-section" style="display: none; padding: 15px;">
            <div id="premium-container">
                <p style="text-align:center; color:var(--text-muted);">Inapakia meseji za Kuntu...</p>
            </div>
        </div>

    </div>
</div>

<script type="module" src="premium.js"></script>
<script>
    if(localStorage.getItem('st_theme') === 'dark') document.body.classList.add('dark');
</script>
</body>
</html>
