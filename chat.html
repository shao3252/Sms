<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sms Tamu - Chats</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .chat-container { display: flex; flex-direction: column; height: calc(100vh - 120px); }
        .chat-box { flex: 1; overflow-y: auto; padding: 10px; background: var(--bg-color); border-radius: var(--radius); margin-bottom: 10px; }
        .msg-bubble { max-width: 80%; padding: 10px 14px; border-radius: 20px; margin-bottom: 10px; font-size: 0.95rem; position: relative;}
        .msg-mine { background: var(--primary-gradient); color: white; align-self: flex-end; margin-left: auto; border-bottom-right-radius: 5px; }
        .msg-others { background: var(--card-bg); color: var(--text-main); align-self: flex-start; border: 1px solid var(--border); border-bottom-left-radius: 5px; }
        .chat-input-area { display: flex; gap: 8px; }
        .chat-input-area input { margin-bottom: 0; flex: 1; border-radius: 30px; padding: 12px 20px; }
        .chat-input-area button { width: auto; border-radius: 50%; width: 45px; height: 45px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        
        .chat-header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 10px; border-bottom: 1px solid var(--border); margin-bottom: 10px;}
        .group-status { font-size: 0.75rem; padding: 3px 8px; border-radius: 10px; background: var(--success); color: white; }
        .group-status.closed { background: var(--danger); }
    </style>
</head>
<body>

<div id="app">
    <div class="content-area">
        <div class="card chat-container">
            
            <div class="chat-header">
                <div style="display:flex; align-items:center; gap:10px;">
                    <button class="btn-outline" style="padding:5px 10px; border:none;" onclick="window.location.href='index.html'">🔙</button>
                    <div>
                        <h3 style="margin:0;">🌍 Global Web Group</h3>
                        <span id="group-state-badge" class="group-status">Open</span>
                    </div>
                </div>
                <div id="admin-group-controls" style="display:none; gap:5px;">
                    <button class="btn-outline" style="padding:4px 8px; font-size:0.8rem;" onclick="chatSystem.toggleGroupStatus()">Lock/Unlock</button>
                </div>
            </div>

            <div class="profile-tabs" style="margin-top:0;">
                <button class="tab active">🌍 Global Group</button>
                <button class="tab" onclick="alert('Private Chats zitafunguliwa Hivi Karibuni!')">💬 Private Chats</button>
            </div>

            <div id="global-chat-box" class="chat-box">
                <p style="text-align:center; color:var(--text-muted); margin-top:20px;">Loading messages...</p>
            </div>

            <div class="chat-input-area">
                <input type="text" id="chat-msg-input" placeholder="Type a message...">
                <button class="btn-primary" onclick="chatSystem.sendGlobalMessage()">➤</button>
            </div>

        </div>
    </div>
</div>

<script type="module" src="chat.js"></script>
</body>
</html>
