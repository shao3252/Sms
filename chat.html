<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sms Tamu - Chats</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
    <div id="toast-container"></div>
    <div class="chat-container" style="display: flex; flex-direction: column; height: 100vh;">
        
        <div class="chat-header" style="background:var(--nav-bg); padding:15px; border-bottom:1px solid var(--border);">
            <div style="display:flex; align-items:center; gap:10px;">
                <button class="btn-outline" style="border:none; background:none; font-size:1.2rem;" onclick="window.location.href='index.html'">🔙</button>
                <div onclick="chatSystem.showAllPinned()" style="cursor:pointer; flex:1;">
                    <h3 id="group-title" style="margin:0; font-size:1.1rem;">🌍 Global Group</h3>
                    <span id="pinned-count-badge" style="font-size:0.75rem; color:var(--primary); font-weight:bold; display:none;">📌 0 Pinned Messages</span>
                </div>
            </div>
        </div>

        <div id="global-chat-box" class="chat-box" style="flex:1; overflow-y:auto; padding:15px; background:var(--bg-color);">
            <p style="text-align:center; color:var(--text-muted);">Loading messages...</p>
        </div>

        <div class="chat-input-area" style="padding:10px; background:var(--card-bg); border-top:1px solid var(--border); display:flex; gap:10px;">
            <input type="text" id="chat-msg-input" placeholder="Andika ujumbe hapa..." style="flex:1; margin-bottom:0;">
            <button class="btn-primary" onclick="chatSystem.sendGlobalMessage()" style="width:auto; padding:0 20px;">➤</button>
        </div>
    </div>

    <div id="pinned-modal" class="modal">
        <div class="modal-content card">
            <h3 style="margin-bottom:15px;">📌 Pinned Messages</h3>
            <div id="pinned-list-container" style="max-height:300px; overflow-y:auto; border-top:1px solid var(--border); padding-top:10px;"></div>
            <button class="btn-outline mt-1" style="width:100%;" onclick="ui.hideModal('pinned-modal')">Funga</button>
        </div>
    </div>

    <div id="msg-options-modal" class="modal">
        <div class="modal-content card">
            <button class="btn-outline" style="width:100%; text-align:left; margin-bottom:10px;" onclick="chatSystem.actionPin()">📌 Pin Message</button>
            <button class="btn-outline" style="width:100%; text-align:left; color:var(--danger);" onclick="chatSystem.actionDelete()">🗑️ Delete Message</button>
            <button class="btn-primary mt-1" style="width:100%;" onclick="ui.hideModal('msg-options-modal')">Cancel</button>
        </div>
    </div>
</div>

<script type="module" src="chat.js"></script>
<script>
    if(localStorage.getItem('st_theme') === 'dark') document.body.classList.add('dark');
</script>
</body>
</html>
