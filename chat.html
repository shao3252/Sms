<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sms Tamu - Global Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
    <div id="toast-container"></div>
    <div class="chat-container">
        
        <div class="chat-header" style="background:var(--nav-bg); padding:10px 15px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px;">
            <button class="icon-btn" onclick="window.location.href='index.html'">🔙</button>
            <img id="group-pic" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23ccc' d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E" class="group-avatar" onclick="chatSystem.editGroupImage()">
            <div style="flex:1; cursor:pointer;" onclick="chatSystem.showGroupInfo()">
                <h3 id="group-title" style="margin:0; font-size:1.1rem; display:flex; align-items:center;">🌍 Global Group</h3>
                <span id="group-status" style="font-size:0.75rem; color:var(--success);">Tupo Online</span>
            </div>
            <button id="admin-lock-btn" class="icon-btn" style="display:none;" onclick="chatSystem.toggleGroupLock()">🔓</button>
        </div>

        <div id="pinned-bar" style="display:none; background:var(--card-bg); padding:8px 15px; border-bottom:1px solid var(--border); font-size:0.8rem; cursor:pointer;" onclick="chatSystem.showAllPinned()">
            <strong style="color:var(--primary);">📌 Pinned (<span id="pin-count">0</span>):</strong> Tap to view
        </div>

        <div id="global-chat-box" class="chat-box"></div>

        <div class="chat-input-area">
            <div id="reply-preview" class="reply-preview">
                <strong id="reply-name" style="color:var(--primary); font-size:0.8rem;"></strong>
                <div id="reply-text" style="color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></div>
                <button onclick="chatSystem.cancelReply()" style="position:absolute; top:5px; right:5px; border:none; background:none; color:var(--text-muted);">✖</button>
            </div>
            <div class="input-row">
                <input type="text" id="chat-msg-input" placeholder="Andika ujumbe...">
                <button onclick="chatSystem.sendGlobalMessage()">➤</button>
            </div>
        </div>
    </div>

    <div id="msg-options-modal" class="modal">
        <div class="modal-content card">
            <button class="btn-outline" style="width:100%; text-align:left; margin-bottom:8px;" onclick="chatSystem.actionReply()">↩️ Reply</button>
            <button id="opt-pin" class="btn-outline" style="width:100%; text-align:left; margin-bottom:8px; display:none;" onclick="chatSystem.actionPin()">📌 Pin Message</button>
            <button id="opt-profile" class="btn-outline" style="width:100%; text-align:left; margin-bottom:8px;" onclick="chatSystem.actionViewProfile()">👤 View Profile</button>
            <button id="opt-admin-make" class="btn-outline" style="width:100%; text-align:left; margin-bottom:8px; display:none; color:var(--secondary);" onclick="chatSystem.actionMakeAdmin()">👑 Make Group Admin</button>
            <button id="opt-block" class="btn-outline" style="width:100%; text-align:left; margin-bottom:8px; display:none; color:var(--danger);" onclick="chatSystem.actionBlockUser()">🚫 Block User</button>
            <button id="opt-delete" class="btn-outline" style="width:100%; text-align:left; color:var(--danger); display:none;" onclick="chatSystem.actionDelete()">🗑️ Delete Message</button>
            <button class="btn-primary mt-1" onclick="ui.hideModal('msg-options-modal')">Ghairi</button>
        </div>
    </div>

    <div id="pinned-modal" class="modal">
        <div class="modal-content card">
            <h3>📌 Pinned Messages</h3>
            <div id="pinned-list-container" style="max-height:300px; overflow-y:auto; margin:15px 0;"></div>
            <button class="btn-outline" onclick="ui.hideModal('pinned-modal')">Funga</button>
        </div>
    </div>
</div>

<script type="module" src="chat.js"></script>
<script>
    if(localStorage.getItem('st_theme') === 'dark') document.body.classList.add('dark');
</script>
</body>
</html>
