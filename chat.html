<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sms Tamu - Global Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
    <div id="toast-container"></div>
    
    <div class="chat-container">
        
        <div class="chat-header" style="background:var(--nav-bg); padding:10px 15px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:10;">
            <button class="icon-btn" style="font-size:1.2rem; background:none; border:none; cursor:pointer;" onclick="window.location.href='index.html'">🔙</button>
            
            <img id="group-pic" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23ccc' d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E" class="group-avatar">
            
            <div style="flex:1;">
                <h3 id="group-title" style="margin:0; font-size:1.1rem;">🌍 Global Group</h3>
                <span id="group-status" style="font-size:0.8rem; color:var(--success);">Tupo Online</span>
            </div>
            
            <button id="group-settings-btn" class="icon-btn" style="display:none; font-size:1.2rem;" onclick="ui.showModal('group-settings-modal')">⚙️</button>
        </div>

        <input type="file" id="group-pic-upload" accept="image/*" style="display:none" onchange="chatSystem.uploadGroupImage(event)">

        <div id="pinned-bar" style="display:none; background:var(--card-bg); padding:10px 15px; border-bottom:1px solid var(--border); font-size:0.85rem; border-left:4px solid var(--primary); cursor:pointer;" onclick="chatSystem.showAllPinned()">
            <strong style="color:var(--primary);">📌 Pinned (<span id="pin-count">0</span>):</strong> Tap to view
        </div>

        <div id="global-chat-box" class="chat-box"></div>

        <div class="chat-input-area" style="position:sticky; bottom:0; z-index:10;">
            <div id="reply-preview" class="reply-preview">
                <strong id="reply-name" style="color:var(--primary); font-size:0.85rem;"></strong>
                <div id="reply-text" style="color:var(--text-muted); font-size:0.9rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></div>
                <button onclick="chatSystem.cancelReply()" style="position:absolute; top:8px; right:8px; border:none; background:none; color:var(--text-muted); font-size:1rem; cursor:pointer;">✖</button>
            </div>
            <div class="input-row">
                <input type="text" id="chat-msg-input" placeholder="Andika ujumbe...">
                <button onclick="chatSystem.sendGlobalMessage()">➤</button>
            </div>
        </div>
    </div>

    <div id="group-settings-modal" class="modal">
        <div class="modal-content card" style="margin-top:auto; border-bottom-left-radius:0; border-bottom-right-radius:0;">
            <h3 style="margin-bottom:15px; border-bottom:1px solid var(--border); padding-bottom:10px;">⚙️ Group Settings</h3>
            <button class="btn-outline" style="width:100%; border:none; text-align:left; font-size:1.1rem; padding:15px 10px;" onclick="document.getElementById('group-pic-upload').click()">📷 Badili Picha ya Group</button>
            <button class="btn-outline" style="width:100%; border:none; text-align:left; font-size:1.1rem; padding:15px 10px;" onclick="chatSystem.editGroupName()">✏️ Badili Jina la Group</button>
            <button id="toggle-lock-btn" class="btn-outline" style="width:100%; border:none; text-align:left; font-size:1.1rem; padding:15px 10px; color:var(--danger);" onclick="chatSystem.toggleGroupLock()">🔒 Funga Group (Lock)</button>
            <button class="btn-primary mt-1" onclick="ui.hideModal('group-settings-modal')">Ghairi</button>
        </div>
    </div>

    <div id="msg-options-modal" class="modal">
        <div class="modal-content card" style="margin-top:auto; border-bottom-left-radius:0; border-bottom-right-radius:0;">
            <h3 style="margin-bottom:15px; border-bottom:1px solid var(--border); padding-bottom:10px;">Options</h3>
            <button class="btn-outline" style="width:100%; border:none; text-align:left; font-size:1.1rem; padding:15px 10px;" onclick="chatSystem.actionReply()">↩️ Reply</button>
            <button class="btn-outline" style="width:100%; border:none; text-align:left; font-size:1.1rem; padding:15px 10px;" onclick="chatSystem.actionCopy()">📋 Copy Text</button>
            <button id="opt-profile" class="btn-outline" style="width:100%; border:none; text-align:left; font-size:1.1rem; padding:15px 10px;" onclick="chatSystem.actionViewProfile()">👤 View Profile</button>
            <button id="opt-pin" class="btn-outline" style="width:100%; display:none; border:none; text-align:left; font-size:1.1rem; padding:15px 10px;" onclick="chatSystem.actionPin()">📌 Pin Message</button>
            <button id="opt-admin-make" class="btn-outline" style="width:100%; display:none; border:none; text-align:left; font-size:1.1rem; padding:15px 10px; color:var(--secondary);" onclick="chatSystem.actionMakeAdmin()">👑 Make Group Admin</button>
            <button id="opt-block" class="btn-outline" style="width:100%; display:none; border:none; text-align:left; font-size:1.1rem; padding:15px 10px; color:var(--danger);" onclick="chatSystem.actionBlockUser()">🚫 Block User</button>
            <button id="opt-delete" class="btn-outline" style="width:100%; display:none; border:none; text-align:left; font-size:1.1rem; padding:15px 10px; color:var(--danger);" onclick="chatSystem.actionDelete()">🗑️ Delete Message</button>
            <button class="btn-primary mt-1" onclick="ui.hideModal('msg-options-modal')">Ghairi</button>
        </div>
    </div>

    <div id="pinned-modal" class="modal">
        <div class="modal-content card">
            <h3>📌 Pinned Messages</h3>
            <div id="pinned-list-container" style="max-height:300px; overflow-y:auto; margin:15px 0;"></div>
            
            <button class="btn-outline mt-1" style="width:100%" onclick="ui.hideModal('pinned-modal')">Funga</button>
        </div>
    </div>
</div>

<script type="module" src="chat.js"></script>
<script>
    if(localStorage.getItem('st_theme') === 'dark') document.body.classList.add('dark');
</script>
</body>
</html>
