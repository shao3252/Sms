<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sms Tamu - Chats</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
    <div id="toast-container"></div>
    <div class="content-area" style="padding-top:0;">
        <div class="chat-container">
            
            <div class="chat-header" style="background:var(--nav-bg); padding:15px; position:sticky; top:0; z-index:10;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <button class="btn-outline" style="padding:5px 10px; border:none;" onclick="window.location.href='index.html'">🔙</button>
                    <div>
                        <h3 style="margin:0; font-size:1.1rem;">🌍 Global Web Group</h3>
                        <span id="group-state-badge" class="group-status" style="font-size:0.7rem; padding:2px 8px; border-radius:10px; color:white;">Open</span>
                    </div>
                </div>
                <div id="admin-group-controls" style="display:none;">
                    <button class="btn-outline" style="padding:4px 8px; font-size:0.8rem; color:var(--primary); border-color:var(--primary);" onclick="chatSystem.toggleGroupStatus()">Lock/Unlock</button>
                </div>
            </div>

            <div id="global-chat-box" class="chat-box">
                <p style="text-align:center; color:var(--text-muted); margin-top:20px;">Loading messages...</p>
            </div>

            <div class="chat-input-area" style="position:sticky; bottom:0; z-index:10;">
                <input type="text" id="chat-msg-input" placeholder="Type a message...">
                <button class="btn-primary" onclick="chatSystem.sendGlobalMessage()">➤</button>
            </div>

        </div>
    </div>

    <div id="msg-options-modal" class="modal">
        <div class="modal-content card" style="margin-top: auto; border-bottom-left-radius: 0; border-bottom-right-radius: 0;">
            <h3 style="margin-bottom:15px; border-bottom:1px solid var(--border); padding-bottom:10px;">Message Options</h3>
            <button class="btn-outline" style="width:100%; border:none; text-align:left; font-size:1.1rem; padding:15px 10px;" onclick="chatSystem.actionCopy()">📋 Copy Text</button>
            <button id="opt-edit" class="btn-outline" style="width:100%; display:none; border:none; text-align:left; font-size:1.1rem; padding:15px 10px;" onclick="chatSystem.actionEdit()">✏️ Edit Message</button>
            <button id="opt-delete" class="btn-outline" style="width:100%; display:none; border:none; text-align:left; font-size:1.1rem; padding:15px 10px; color:var(--danger);" onclick="chatSystem.actionDelete()">🗑️ Delete Message</button>
            <button class="btn-primary mt-1" onclick="ui.hideModal('msg-options-modal')">Cancel</button>
        </div>
    </div>

</div>

<script type="module" src="chat.js"></script>
</body>
</html>
